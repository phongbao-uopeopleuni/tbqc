services:
  - type: web
    name: tbqc-giapha
    env: python
    buildCommand: pip install -r requirements.txt
    # Must match Procfile. Production is currently verified on Railway; this is the Render fallback.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 --preload --max-requests 1000 --max-requests-jitter 50
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: tbqc-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: tbqc-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tbqc-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: tbqc-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: tbqc-db
          property: port
      # Mat khau ung dung (cho trang Thanh vien: Them, Cap nhat, Xoa, Sao luu)
      # Dat cac bien nay trong Render Dashboard > Environment Variables (khong hardcode o day)
      - key: MEMBERS_PASSWORD
        sync: false  # Phai dat thu cong trong Render Dashboard
      - key: ADMIN_PASSWORD
        sync: false  # Phai dat thu cong trong Render Dashboard
      - key: BACKUP_PASSWORD
        sync: false  # Phai dat thu cong trong Render Dashboard
      # Geoapify API Key (cho ban do tim kiem mo tren trang /genealogy)
      # Dat trong Render Dashboard > Environment Variables (khong hardcode o day)
      # Lay API key mien phi: https://www.geoapify.com/ (3.000 yeu cau/ngay)
      - key: GEOAPIFY_API_KEY
        sync: false  # Phai dat thu cong trong Render Dashboard
      # Cookie domain - de SESSION & REMEMBER cookie dung chung cho domain chinh va www
      # Dat gia tri: .phongtuybienquancong.info (co dau cham de cover ca subdomain)
      # Production yeu cau HTTPS; SESSION_COOKIE_SECURE=True nen qua HTTP se khong gui cookie
      - key: COOKIE_DOMAIN
        sync: false  # Phai dat thu cong trong Render Dashboard: .phongtuybienquancong.info

databases:
  - name: tbqc-db
    # Cấu hình DB: đặt tên và user theo ý (không hardcode mật khẩu - Render tự sinh)
    databaseName: tbqc_db
    user: tbqc_user
    plan: free
