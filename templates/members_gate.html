<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Đăng nhập - Thành viên - TBQC Gia Phả</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    /* Đồng bộ nền với trang Gia phả: dùng token --color-bg từ main.css */
    body {
      font-family: var(--font-family-serif, 'Noto Serif TC', 'Playfair Display', serif);
      background: var(--color-bg, #F8F5EF);
      background-attachment: fixed;
      padding-top: 64px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .gate-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .gate-card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      max-width: 450px;
      width: 100%;
    }

    .gate-card h1 {
      color: #8B0000;
      font-size: 32px;
      margin-bottom: 10px;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .gate-card p {
      color: #666;
      font-size: 16px;
      text-align: center;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 18px;
      border: 2px solid #DAA520;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Noto Serif TC', serif;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #8B0000;
      box-shadow: 0 0 10px rgba(218, 165, 32, 0.5);
    }

    .error-message {
      color: #c62828;
      font-size: 14px;
      margin-top: 10px;
      padding: 10px;
      background: #ffebee;
      border-radius: 8px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .btn-login {
      width: 100%;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Noto Serif TC', serif;
      background: linear-gradient(135deg, #8B0000 0%, #DC143C 100%);
      color: #FFD700;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #8B0000;
      margin-right: 8px;
      flex-shrink: 0;
    }
    
    label[for="rememberLogin"] {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      font-weight: 500;
      color: #333;
      transition: color 0.2s ease;
    }
    
    label[for="rememberLogin"]:hover {
      color: #8B0000;
    }
    
    .remember-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(139, 0, 0, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(139, 0, 0, 0.1);
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    
    .remember-container:hover {
      background: rgba(139, 0, 0, 0.05);
      border-color: rgba(139, 0, 0, 0.2);
    }
    
    .remember-container input[type="checkbox"]:checked + label {
      color: #8B0000;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .gate-card {
        padding: 30px 20px;
      }

      .gate-card h1 {
        font-size: 24px;
      }
    }
  </style>

    <!-- Global CSRF Fetch Interceptor -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var metaTag = document.querySelector('meta[name="csrf-token"]');
        if (metaTag) {
          var csrfToken = metaTag.getAttribute('content');
          var originalFetch = window.fetch;
          window.fetch = function(url, options) {
            options = options || {};
            if (options.method && ['POST', 'PUT', 'DELETE', 'PATCH'].includes(options.method.toUpperCase())) {
              options.headers = options.headers || {};
              // Set the token header as expected by flask_wtf.csrf
              options.headers['X-CSRFToken'] = csrfToken;
              if (options.body && !(options.body instanceof FormData) && !options.headers['Content-Type']) {
                  options.headers['Content-Type'] = 'application/json';
              }
            }
            return originalFetch(url, options);
          };
        }
      });
    </script>
</head>
<body>
  <!-- Navbar đồng bộ với Gia phả (main.css/navbar.css), không hiển thị Hoạt động -->
  <nav class="navbar">
    <button class="navbar-toggle" onclick="toggleMenu()" aria-label="Menu">☰</button>
    <div class="navbar-brand"><a href="/" class="navbar-logo">Gia Phả TBQC</a></div>
    <ul class="navbar-menu" id="navbarMenu">
      <li><a href="/">Trang chủ</a></li>
      <li><a href="/genealogy">Gia phả</a></li>
      <li><a href="/members" class="active">Thành viên</a></li>
    </ul>
  </nav>

  <div class="gate-container">
    <div class="gate-card">
      <h1>🔐 Đăng nhập</h1>
      <p>Vui lòng đăng nhập để truy cập trang Thành viên</p>
      
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" required>
        </div>
        
        <div class="remember-container">
          <input type="checkbox" id="rememberLogin">
          <label for="rememberLogin">Lưu mật khẩu</label>
        </div>
        
        <div class="error-message" id="errorMessage">
          Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.
        </div>
        
        <button type="submit" class="btn-login" id="loginBtn">Đăng nhập</button>
      </form>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('navbarMenu');
      menu.classList.toggle('active');
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const username = String(document.getElementById('username').value || '').trim();
      const password = String(document.getElementById('password').value || '').trim();
      const rememberCheckbox = document.getElementById('rememberLogin');
      const errorDiv = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');
      
      errorDiv.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Đang xác thực...';
      
      try {
        const response = await fetch('/members/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username: username, password: password })
        });
        
        let result;
        try {
          result = await response.json();
        } catch (e) {
          result = { success: false, error: response.status === 401 ? 'Tên đăng nhập hoặc mật khẩu không đúng.' : 'Lỗi phản hồi từ server.' };
        }
        
        if (result && result.success) {
          // Lưu thông tin đăng nhập nếu checkbox được tick
          if (rememberCheckbox && rememberCheckbox.checked) {
            try {
              // Lưu username và password vào localStorage (có thể mã hóa cơ bản)
              localStorage.setItem('members_username', username);
              localStorage.setItem('members_password', password);
              localStorage.setItem('members_remember', 'true');
            } catch (e) {
              console.warn('Cannot save to localStorage:', e);
            }
          } else {
            // Xóa thông tin đã lưu nếu không tick
            try {
              localStorage.removeItem('members_username');
              localStorage.removeItem('members_password');
              localStorage.removeItem('members_remember');
            } catch (e) {
              console.warn('Cannot remove from localStorage:', e);
            }
          }
          
          // Đăng nhập thành công - redirect về /members
          window.location.href = '/members';
        } else {
          // Đăng nhập thất bại - hiển thị lỗi
          errorDiv.classList.add('show');
          document.getElementById('password').value = '';
          document.getElementById('username').focus();
        }
      } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'Lỗi kết nối. Vui lòng thử lại.';
        errorDiv.classList.add('show');
      } finally {
        // Restore button
        loginBtn.disabled = false;
        loginBtn.textContent = 'Đăng nhập';
      }
    }

    // Load thông tin đăng nhập đã lưu khi trang load
    document.addEventListener('DOMContentLoaded', () => {
      try {
        const savedUsername = localStorage.getItem('members_username');
        const savedPassword = localStorage.getItem('members_password');
        const rememberSaved = localStorage.getItem('members_remember');
        
        if (savedUsername && savedPassword && rememberSaved === 'true') {
          const usernameInput = document.getElementById('username');
          const passwordInput = document.getElementById('password');
          const rememberCheckbox = document.getElementById('rememberLogin');
          
          if (usernameInput && passwordInput) {
            usernameInput.value = savedUsername;
            passwordInput.value = savedPassword;
            if (rememberCheckbox) {
              rememberCheckbox.checked = true;
            }
            
            // Tự động submit sau một chút delay
            setTimeout(() => {
              const form = document.getElementById('loginForm');
              if (form) {
                handleLogin(new Event('submit'));
              }
            }, 300);
          }
        } else {
          // Focus vào username nếu không có thông tin đã lưu
          document.getElementById('username').focus();
        }
      } catch (e) {
        console.warn('Cannot load from localStorage:', e);
        document.getElementById('username').focus();
      }
    });
  </script>
</body>
</html>
