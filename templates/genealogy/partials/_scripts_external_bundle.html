  <script>
    window.genealogyTreeRootPersonId = window.genealogyTreeRootPersonId || 'P-1-1';
    /** Mặc định "Hiển thị đến đời" khi vào trang Gia phả (trước khi API thống kê đổ dropdown) */
    window.GENEALOGY_DEFAULT_DISPLAY_GENERATION =
      typeof window.GENEALOGY_DEFAULT_DISPLAY_GENERATION === 'number' && window.GENEALOGY_DEFAULT_DISPLAY_GENERATION > 0
        ? window.GENEALOGY_DEFAULT_DISPLAY_GENERATION
        : 5;
    /** Giá trị hiển thị đời: dropdown nếu hợp lệ, không thì mặc định ở trên */
    window.getGenealogyDisplayMaxGen = function () {
      const el = document.getElementById('genFilter');
      if (el && el.value) {
        const n = parseInt(el.value, 10);
        if (Number.isFinite(n) && n > 0) return n;
      }
      const d = window.GENEALOGY_DEFAULT_DISPLAY_GENERATION;
      return typeof d === 'number' && d > 0 ? d : 5;
    };
  </script>
