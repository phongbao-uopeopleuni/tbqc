{# Trang đăng nhập Admin - dùng admin.css, không navbar #}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Admin - TBQC Gia Phả</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/admin.css">

    <!-- Global CSRF Fetch Interceptor -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var metaTag = document.querySelector('meta[name="csrf-token"]');
        if (metaTag) {
          var csrfToken = metaTag.getAttribute('content');
          var originalFetch = window.fetch;
          window.fetch = function(url, options) {
            options = options || {};
            if (options.method && ['POST', 'PUT', 'DELETE', 'PATCH'].includes(options.method.toUpperCase())) {
              options.headers = options.headers || {};
              // Set the token header as expected by flask_wtf.csrf
              options.headers['X-CSRFToken'] = csrfToken;
              if (options.body && !(options.body instanceof FormData) && !options.headers['Content-Type']) {
                  options.headers['Content-Type'] = 'application/json';
              }
            }
            return originalFetch(url, options);
          };
        }
      });
    </script>
</head>
<body class="admin-login-page">
  <div class="admin-login-container" data-remembered="{{ remembered_username|default('', true)|e }}">
    <h1>Đăng nhập Admin</h1>
    <p class="subtitle">Hệ thống quản trị TBQC Gia Phả</p>
    <div id="loginError" class="error" {% if not error %}style="display:none"{% endif %}>{% if error %}{{ error }}{% endif %}</div>
    <form id="loginForm" onsubmit="return handleAdminLogin(event)">
      {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
      {% endif %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="row-remember">
        <input type="checkbox" id="remember_username" name="remember_username" value="1">
        <label for="remember_username">Lưu tài khoản</label>
      </div>
      <button type="submit" class="btn-login">Đăng nhập</button>
    </form>
    <div class="back-link">
      <a href="/">← Về trang chủ</a>
    </div>
  </div>
  <script>
    (function() {
      var el = document.querySelector('.admin-login-container');
      var saved = (el && el.getAttribute('data-remembered')) || '';
      var prefill = document.getElementById('username');
      var check = document.getElementById('remember_username');
      if (saved && prefill) prefill.value = saved;
      if (saved && check) check.checked = true;
    })();

    async function handleAdminLogin(e) {
      e.preventDefault();
      var form = document.getElementById('loginForm');
      var fd = new FormData(form);
      fd.append('username', form.username.value);
      fd.append('password', form.password.value);
      fd.append('remember', '1');
      var nextInput = form.querySelector('input[name=next]');
      if (nextInput && nextInput.value) fd.append('redirect', nextInput.value);
      var errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      errEl.textContent = '';
      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          body: fd,
          credentials: 'include'
        });
        var data = await res.json();
        if (data.success) {
          window.location.href = data.redirect || '/admin/users';
        } else {
          errEl.textContent = data.error || 'Đăng nhập thất bại';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Lỗi kết nối: ' + err.message;
        errEl.style.display = 'block';
      }
      return false;
    }
  </script>
</body>
</html>
