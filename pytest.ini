[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra
markers =
    db_integration: requires the Docker-backed MySQL test container
    pure: safe to run in parallel without shared DB state
filterwarnings =
    ignore::DeprecationWarning

# Log output — luon ghi vao logs/ khong phai root
log_file = logs/pytest.log
log_file_level = WARNING
log_file_format = %(asctime)s %(levelname)s %(name)s %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
